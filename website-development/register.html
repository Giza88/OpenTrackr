<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | OpenTrackr</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="site-header-inner">
                <h1 class="site-title"><a href="index.html">📋 OpenTrackr</a></h1>
                <nav class="site-nav" aria-label="Main navigation">
                    <a href="index.html">Home</a>
                    <a href="tracker.html">Task Tracker</a>
                    <a href="register.html" class="active">Register</a>
                </nav>
            </div>
        </header>

        <main class="site-content">
            <section class="content-section">
                <h2>Create Your OpenTrackr Account</h2>
                <p class="intro-text">
                    Register to save your planning preferences and stay organised across your day and week.
                </p>

                <form id="registrationForm" class="register-form">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" required
                            pattern="[A-Za-z]+" title="First name must contain letters only">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" required
                            pattern="[A-Za-z]+" title="Last name must contain letters only">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="mobile">Mobile Number</label>
                        <input type="text" id="mobile" name="mobile" required
                            pattern="[0-9]{10}" maxlength="10" title="Mobile number must be 10 digits">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required
                            minlength="6" maxlength="12" title="Password must be 6 to 12 characters">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required
                            minlength="6" maxlength="12">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Submit</button>
                    </div>
                </form>
                <p id="formMessage" role="status" aria-live="polite"></p>
            </section>
        </main>

        <footer class="site-footer">
            <p>Stefan Gislason | Assessment 3 Due: 23 July 2026</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
